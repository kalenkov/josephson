name: Build

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libboost-all-dev \
            libeigen3-dev \
            pybind11-dev \
            python3 \
            python3-pytest \
            python3-numpy

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run tests (fast)
        run: ctest --test-dir build --output-on-failure -L fast

  linux-clang:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            clang \
            libomp-dev \
            libboost-all-dev \
            libeigen3-dev \
            pybind11-dev \
            python3 \
            python3-pytest \
            python3-numpy

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run tests (fast)
        run: ctest --test-dir build --output-on-failure -L fast

  fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install deps
        run: |
          dnf -y update
          dnf -y install \
            cmake \
            gcc-c++ \
            python3 \
            python3-devel \
            ninja-build \
            boost-devel \
            eigen3-devel \
            python3-pytest \
            python3-numpy

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure -L fast

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-eigen3
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pybind11
            mingw-w64-x86_64-python-pytest
            mingw-w64-x86_64-python-numpy

      - name: Configure
        shell: msys2 {0}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPython_EXECUTABLE=$(which python)

      - name: Build
        shell: msys2 {0}
        run: cmake --build build -j

      - name: Run tests (fast)
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure -L fast